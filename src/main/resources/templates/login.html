<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Profit Plate - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#ff906a", "secondary": "#ff734c", "surface": "#0e0e0e", "background": "#0e0e0e", "on-surface": "#ffffff", "primary-container": "#ff794a", "surface-container": "#1a1a1a", "surface-container-low": "#131313", "on-surface-variant": "#adaaaa", "outline-variant": "#484847" }, fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Inter"] } } }
        }
    </script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #0e0e0e; }</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary/30">
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-gradient-to-tr from-surface via-surface/90 to-surface/40 z-10"></div>
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDyOASSG6e7-458Pye_zf1JxgjQ3_ltg0IdAggbfOgUzOeOTKgwhGwCEm7TBHfjqAqJGho-qPZEa90GZQAqBDMQ56lPVAaynZsjAJnCRmzl4Q10694hqFe3lqXsxXLrhvgaQQfx6g8ieX4tm7JIIbFiat0wagq0a0weP114B8i4qTGAR5ORkD_IFMNkm-Ng-QguzqsHiD8h-LentofZYcT3sLlBxA4Y07N_7JyhDF5chIIYCp4GieuzW0vYEcwN6bH4ffKEdE-Qz5I" alt="Kitchen" class="w-full h-full object-cover brightness-[0.3]">
    </div>
    <main class="relative z-20 w-full max-w-[1100px] grid lg:grid-cols-2 bg-surface-container rounded-xl overflow-hidden shadow-2xl border border-white/5">
        <section class="hidden lg:flex flex-col justify-between p-12 bg-surface-container-low relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-12">
                    <span class="material-symbols-outlined text-primary text-3xl">restaurant</span>
                    <h1 class="text-2xl font-bold italic text-primary" style="font-family:'Plus Jakarta Sans'">Profit Plate</h1>
                </div>
                <h2 class="text-4xl font-extrabold leading-tight mb-6" style="font-family:'Plus Jakarta Sans'">Master the heat of the <span class="text-primary">kitchen pass.</span></h2>
                <p class="text-on-surface-variant max-w-md leading-relaxed text-lg">Precision management for the world's most demanding culinary environments.</p>
            </div>
            <div class="absolute -bottom-20 -left-20 w-80 h-80 bg-primary/10 rounded-full blur-[100px]"></div>
        </section>
        <section class="flex flex-col justify-center p-8 lg:p-16 bg-surface-container">
            <div class="max-w-md mx-auto w-full">
                <header class="mb-10 text-center lg:text-left">
                    <h2 class="text-3xl font-bold mb-2" style="font-family:'Plus Jakarta Sans'">Welcome!</h2>
                    <p class="text-on-surface-variant">Enter your credentials to access the hub.</p>
                </header>
                <form class="space-y-6" id="loginForm">
                    <div class="space-y-2">
                        <label class="text-xs font-medium text-on-surface-variant uppercase tracking-widest ml-1">Email Address</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">mail</span>
                            <input class="w-full bg-surface-container-low border-none ring-1 ring-white/10 focus:ring-2 focus:ring-primary/50 rounded-lg py-4 pl-12 pr-4 text-on-surface" id="email" type="email" required placeholder="chef@midnight.com" />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-xs font-medium text-on-surface-variant uppercase tracking-widest">Password</label>
                        </div>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">lock</span>
                            <input class="w-full bg-surface-container-low border-none ring-1 ring-white/10 focus:ring-2 focus:ring-primary/50 rounded-lg py-4 pl-12 pr-4 text-on-surface" id="password" type="password" required placeholder="••••••••" />
                        </div>
                    </div>
                    <button class="w-full bg-gradient-to-br from-primary to-primary-container text-black font-bold py-4 rounded-lg shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Log In <span class="material-symbols-outlined text-xl">arrow_forward</span>
                    </button>
                </form>
                <footer class="mt-12 text-center">
                    <p class="text-on-surface-variant text-sm">Don't have an account yet? <a class="text-primary font-bold hover:underline ml-1" href="/signup">Register</a></p>
                </footer>
            </div>
        </section>
    </main>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const data = await response.json();
                if (response.ok) { window.location.href = '/role-selection'; }
                else { alert(data.error || 'Login failed'); }
            } catch (err) { alert('An error occurred during login'); }
        });
    </script>
</body>
</html>
